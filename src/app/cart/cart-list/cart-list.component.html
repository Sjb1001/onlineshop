<div class="cart-page">

    <h1>🛒 Shopping Cart</h1>

    <div *ngIf="cartItems.length==0" class="empty-cart">

        <h2>Your cart is empty.</h2>

        <button routerLink="/products">

            Browse Products

        </button>

    </div>

    <div *ngIf="cartItems.length>0">

        <div
            class="cart-card"
            *ngFor="let item of cartItems">

            <img

                [src]="item.product?.image ? 'http://localhost:3000'+item.product.image : 'assets/no-image.png'"

                class="product-image">

            <div class="cart-info">

                <h2>

                    {{ item.product.productName }}

                </h2>

                <p class="price">

                    ₱{{ item.product.price }}

                </p>

                <p class="subtotal">

                    Subtotal:

                    ₱{{ item.product.price * item.quantity }}

                </p>

                <div class="quantity">

                    <button (click)="decreaseQuantity(item)">

                        −

                    </button>

                    <span>

                        {{ item.quantity }}

                    </span>

                    <button (click)="increaseQuantity(item)">

                        +

                    </button>

                </div>

            </div>

            <button

                class="remove"

                (click)="removeItem(item)">

                Remove

            </button>

        </div>

        <div class="summary">

            <h2>

                Order Summary

            </h2>

            <div class="summary-row">

                <span>Total</span>

                <strong>

                    ₱{{ totalPrice }}

                </strong>

            </div>

            <div class="summary-buttons">

                <button
                    class="clear"

                    (click)="clearCart()">

                    Clear Cart

                </button>

                <button
                    class="checkout"

                    (click)="checkout()">

                    Proceed to Checkout

                </button>

            </div>

        </div>

    </div>

</div>
