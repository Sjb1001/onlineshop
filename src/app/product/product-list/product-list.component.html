<div class="container">

  <h2>🔥 Just For You</h2>

  <div class="grid">

    <div class="product-card" *ngFor="let product of products">

      <img
        [src]="product.image"
        [alt]="product.name"
        class="product-image"
      >

      <h3>{{ product.name }}</h3>

      <p>{{ product.description }}</p>

      <h4>₱{{ product.price }}</h4>

      <button (click)="addToCart(product)">
        Add to Cart
      </button>

    </div>

  </div>

</div>
