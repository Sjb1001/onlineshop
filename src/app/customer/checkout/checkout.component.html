<div class="container">

<h2>Checkout</h2>

<hr>

<table>

<tr>

<th>Product</th>

<th>Price</th>

</tr>

<tr *ngFor="let item of cartItems">

<td>{{ item.productName }}</td>

<td>₱{{ item.price }}</td>

</tr>

</table>

<h3>Total: ₱{{ total }}</h3>

<div class="form-group">

    <label>Delivery Address</label>

    <input
        type="text"
        [(ngModel)]="deliveryAddress">

</div>

<div class="form-group">

    <label>Latitude</label>

    <input
        type="number"
        [(ngModel)]="deliveryLatitude">

</div>

<div class="form-group">

    <label>Longitude</label>

    <input
        type="number"
        [(ngModel)]="deliveryLongitude">

</div>

<br>

<button (click)="placeOrder()">

Place Order

</button>

</div>
