<div class="container">

<h2>Checkout</h2>

<hr>

<table>

<tr>

<th>Product</th>

<th>Price</th>

</tr>

<tr *ngFor="let item of cartItems">

<td>{{ item.productName }}</td>

<td>₱{{ item.price }}</td>

</tr>

</table>

<h3>Total: ₱{{ total }}</h3>

<button (click)="placeOrder()">

Place Order

</button>

</div>
