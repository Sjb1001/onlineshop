<div class="orders-page">

    <h1>📦 My Orders</h1>

    <div class="empty" *ngIf="orders.length===0">

        <h2>No orders yet.</h2>

        <p>Your purchases will appear here.</p>

    </div>

    <div
        class="order-card"
        *ngFor="let order of orders">

        <div class="order-header">

            <div>

                <h2>

                    Order #{{ order._id.slice(-6).toUpperCase() }}

                </h2>

                <small>

                    {{ order.createdAt | date:'medium' }}

                </small>

            </div>

            <span
                class="status"
                [ngClass]="{

                    pending:order.status=='Pending',

                    pickup:order.status=='Picked Up',

                    transit:order.status=='In Transit',

                    delivered:order.status=='Delivered',

                    cancelled:order.status=='Cancelled'

                }">

                {{ order.status }}

            </span>

        </div>

        <div
            class="product-row"
            *ngFor="let item of order.items">

            <img
                [src]="item.product.image ? 'http://localhost:3000'+item.product.image : 'assets/no-image.png'">

            <div class="details">

                <h3>

                    {{ item.product.productName }}

                </h3>

                <p>

                    Quantity: {{ item.quantity }}

                </p>

            </div>

            <div class="price">

                ₱{{ item.price }}

            </div>

        </div>

        <div class="summary">

            <h3>

                Total

            </h3>

            <h2>

                ₱{{ order.total }}

            </h2>

        </div>

        <div class="actions">

            <button
                class="cancel"
                *ngIf="order.status=='Pending'"
                (click)="cancelOrder(order)">

                Cancel Order

            </button>

            <button
                class="review"
                *ngIf="order.status=='Delivered'"
                (click)="writeReview(order.items[0].product)">

                ⭐ Write Review

            </button>

        </div>

    </div>

</div>
