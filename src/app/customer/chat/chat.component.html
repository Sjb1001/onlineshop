<div class="chat-container">

    <h2>Chat Seller</h2>

    <div class="messages">

        <div
            *ngFor="let msg of messages"
            [style.text-align]="msg.sender._id === customerId ? 'right' : 'left'">

            <div
                style="
                    display:inline-block;
                    padding:10px;
                    margin:8px;
                    border-radius:10px;
                    background:#f5f5f5;
                ">

                <strong>

                    {{ msg.sender.fullname }}

                </strong>

                <br>

                {{ msg.message }}

            </div>

        </div>

    </div>

    <div class="send-box">

        <input
            [(ngModel)]="newMessage"
            placeholder="Type a message...">

        <button
            (click)="sendMessage()">

            Send

        </button>

    </div>

</div>
