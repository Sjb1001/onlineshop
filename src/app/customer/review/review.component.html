<div class="container">

    <h2>Write a Review</h2>

    <label>

        Rating

    </label>

    <br>

    <select [(ngModel)]="rating">

        <option [value]="5">⭐⭐⭐⭐⭐ (5)</option>

        <option [value]="4">⭐⭐⭐⭐ (4)</option>

        <option [value]="3">⭐⭐⭐ (3)</option>

        <option [value]="2">⭐⭐ (2)</option>

        <option [value]="1">⭐ (1)</option>

    </select>

    <br><br>

    <label>

        Comment

    </label>

    <br>

    <textarea

        rows="5"

        cols="40"

        [(ngModel)]="comment">

    </textarea>

    <br><br>

    <button

        (click)="submitReview()">

        Submit Review

    </button>

</div>
