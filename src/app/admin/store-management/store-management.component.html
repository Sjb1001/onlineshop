<div class="store-page">

    <div class="page-header">

        <h1>🏪 Store Management</h1>

        <p>
            Review, approve, and manage seller stores.
        </p>

    </div>

    <div class="card">

        <table>

            <thead>

                <tr>

                    <th>Store</th>

                    <th>Owner</th>

                    <th>Status</th>

                    <th width="320">Actions</th>

                </tr>

            </thead>

            <tbody>

                <tr *ngFor="let store of stores">

                    <td>

                        <strong>{{ store.storeName }}</strong>

                    </td>

                    <td>

                        {{ store.owner?.fullname }}

                    </td>

                    <td>

                        <span
                            class="status"
                            [ngClass]="{

                            pending: store.status=='pending',

                            approved: store.status=='approved',

                            rejected: store.status=='rejected'

                            }">

                            {{ store.status }}

                        </span>

                    </td>

                    <td>

                        <div
                            class="actions"
                            *ngIf="store.status=='pending'">

                            <button
                                class="approve-btn"
                                (click)="approve(store._id)">

                                ✔ Approve

                            </button>

                            <button
                                class="reject-btn"
                                (click)="reject(store._id)">

                                ✖ Reject

                            </button>

                        </div>

                        <button
                            *ngIf="store.status=='approved'"
                            class="category-btn"
                            [routerLink]="['/admin/store', store._id, 'categories']">

                            📂 Manage Categories

                        </button>

                        <span
                            *ngIf="store.status=='rejected'"
                            class="rejected-text">

                            Rejected

                        </span>

                    </td>

                </tr>

            </tbody>

        </table>

        <div
            class="empty"
            *ngIf="stores.length==0">

            No stores available.

        </div>

    </div>

</div>
