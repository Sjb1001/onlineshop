<div class="chat-page">

    <div class="chat-header">

        <h2>💬 Customer Conversation</h2>

    </div>

    <div class="messages">

        <div
            *ngFor="let msg of messages"
            class="message-row"
            [class.me]="msg.sender._id === sellerId">

            <div
                class="message-bubble"
                [class.my-message]="msg.sender._id === sellerId"
                [class.other-message]="msg.sender._id !== sellerId">

                <div class="sender">

                    {{ msg.sender.fullname }}

                </div>

                <div class="text">

                    {{ msg.message }}

                </div>

            </div>

        </div>

    </div>

    <div class="send-box">

        <input
            [(ngModel)]="newMessage"
            placeholder="Type your reply...">

        <button (click)="sendMessage()">

            Send

        </button>

    </div>

</div>
