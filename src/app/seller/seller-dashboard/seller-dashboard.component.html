<div class="dashboard">

    <div class="header">

        <div>

            <h1>🏪 Seller Dashboard</h1>

            <p>

                Welcome back,

                <strong>{{ fullname }}</strong>

            </p>

        </div>

    </div>

    <div *ngIf="store; else noStore">

        <!-- STORE INFO -->

        <div class="store-card">

            <div>

                <h2>{{ store.storeName }}</h2>

                <p>

                    Store Status

                </p>

            </div>

            <span
                class="badge"
                [ngClass]="store.status">

                {{ store.status }}

            </span>

        </div>

        <!-- QUICK ACTIONS -->

        <div
            class="actions"
            *ngIf="store.status=='approved'">

            <button routerLink="/seller/add-product">

                ➕
                <span>Add Product</span>

            </button>

            <button routerLink="/seller/my-products">

                📦
                <span>My Products</span>

            </button>

            <button routerLink="/seller/orders">

                🧾
                <span>Orders</span>

            </button>

            <button routerLink="/seller/inbox">

                💬
                <span>Messages</span>

            </button>

        </div>

        <!-- CATEGORY CARD -->

        <div class="categories-card">

            <h2>

                Allowed Categories

            </h2>

            <div
                class="chips"
                *ngIf="store.allowedCategories?.length>0">

                <span
                    *ngFor="let category of store.allowedCategories">

                    {{ category.name }}

                </span>

            </div>

            <p *ngIf="store.allowedCategories?.length==0">

                No categories assigned yet.

            </p>

        </div>

    </div>

    <ng-template #noStore>

        <div class="no-store">

            <h2>

                You don't have a store yet.

            </h2>

            <button routerLink="/seller/create-store">

                Create Store

            </button>

        </div>

    </ng-template>

</div>
